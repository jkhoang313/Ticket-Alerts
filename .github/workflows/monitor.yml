name: Monitor Treasure Cup tickets

on:
  schedule:
    # Every 5 minutes. 5 min is GitHub's minimum; scheduled runs are
    # best-effort and can be delayed or skipped under load (see README).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}        # lets you trigger a manual run from the Actions tab

permissions:
  contents: write              # needed to commit the updated state file

concurrency:
  group: ticket-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check availability
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_tickets.py

      - name: Commit state changes
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update ticket state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
